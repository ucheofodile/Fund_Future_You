function SectionHeader({ num, title }) {
return (
<div style={{ marginBottom: 12 }}>
<div style={{ fontFamily: “sans-serif”, fontSize: 10, letterSpacing: 3, color: ACCENT, marginBottom: 4 }}>{num}</div>
<div style={{ fontFamily: “sans-serif”, fontSize: 11, fontWeight: 700, letterSpacing: 2, color: ACCENT, borderBottom: `1px solid ${RULE}`, paddingBottom: 6 }}>{title}</div>
</div>
);
}

function Callout({ text }) {
return (
<div style={{ borderLeft: `3px solid ${ACCENT}`, backgroundColor: CALLOUT, padding: “12px 16px”, margin: “12px 0”, fontSize: 13, lineHeight: 1.7, color: DARK, fontStyle: “italic” }}>{text}</div>
);
}

function NInput({ value, onChange }) {
return (
<input type=“number” value={value} onChange={e => onChange(e.target.value)}
style={{ width: “100%”, border: `1px solid ${RULE}`, borderRadius: 3, padding: “5px 8px”, fontSize: 13, color: DARK, outline: “none” }} />
);
}

function TInput({ value, onChange, placeholder }) {
return (
<input type=“text” value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
style={{ width: “100%”, border: `1px solid ${RULE}`, borderRadius: 3, padding: “5px 8px”, fontSize: 13, color: DARK, outline: “none” }} />
);
}

const [checked, setChecked] = React.useState([false,false,false,false,false]);
const [sabAmt, setSabAmt] = React.useState(””);
const [sabDate, setSabDate] = React.useState(””);

const updI = (r,c2,v) => setIncome(income.map((row,i) => i===r ? row.map((x,j)=>j===c2?v:x) : row));
const updE = (r,c2,v) => setExpenses(expenses.map((row,i) => i===r ? row.map((x,j)=>j===c2?v:x) : row));
const totI = (col) => income.reduce((s,r) => s+(parseFloat(r[col])||0), 0);
const totE = (col) => expenses.reduce((s,r) => s+(parseFloat(r[col])||0), 0);
const surp = (col) => totI(col) - totE(col);
const fmt = (n) => n===0 ? “” : n.toLocaleString();
const fmtS = (n,col) => { if(totI(col)===0&&totE(col)===0) return “”; return (n>=0?”+”:””)+n.toLocaleString(); };

const th = { backgroundColor: DARK, color: “white”, fontFamily: “sans-serif”, fontSize: 11, fontWeight: 700, padding: “8px 10px”, textAlign: “center” };
const td = { padding: “8px 10px”, fontSize: 13, color: MID, borderBottom: `1px solid ${RULE}`, verticalAlign: “top” };

return (

    <div style={{ marginBottom: 28 }} />

    {/* S4 — AUTOMATE */}
    <SectionHeader num={c.automate.num} title={c.automate.title} />
    <p style={{ fontSize: 13, color: MID, lineHeight: 1.6, marginBottom: 12 }}>{c.automate.intro}</p>
    <div style={{ backgroundColor: LIGHT, border: `1px solid ${RULE}`, borderRadius: 4, overflow: "hidden", marginBottom: 28 }}>
      {c.automate.rows.map((row,i)=>(
        <div key={i} style={{ display:"flex", gap:16, padding:"10px 16px", borderBottom: i<c.automate.rows.length-1?`1px solid ${RULE}`:"none", backgroundColor: i%2===0?"white":LIGHT }}>
          <div style={{ fontFamily:"sans-serif", fontSize:12, fontWeight:700, color:DARK, minWidth:110 }}>{row[0]}</div>
          <div style={{ fontSize:13, color:MID }}>{row[1]}</div>
        </div>
      ))}
    </div>

    {/* S5 — MINDSET */}
    <SectionHeader num={c.mindset.num} title={c.mindset.title} />
    <div style={{ border:`1px solid ${RULE}`, borderRadius:4, overflow:"hidden", marginBottom:28 }}>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 40px" }}>
        <div style={{...th, padding:"8px 12px", textAlign:"left"}}>{c.mindset.fromLabel}</div>
        <div style={{...th, padding:"8px 12px", textAlign:"left"}}>{c.mindset.toLabel}</div>
        <div style={{...th, padding:"8px 12px"}}>✓</div>
        {c.mindset.rows.map((row,i)=>(
          <React.Fragment key={i}>
            <div style={{ padding:"10px 12px", fontSize:12, color:SOFT, backgroundColor:i%2===0?"white":"#FAF5F0", borderTop:`1px solid ${RULE}`, fontStyle:"italic", lineHeight:1.5 }}>{row.from}</div>
            <div style={{ padding:"10px 12px", fontSize:12, color:GREEN, fontWeight:700, backgroundColor:i%2===0?"white":"#FAF5F0", borderTop:`1px solid ${RULE}`, lineHeight:1.5 }}>{row.to}</div>
            <div style={{ padding:"10px 12px", backgroundColor:i%2===0?"white":"#FAF5F0", borderTop:`1px solid ${RULE}`, display:"flex", alignItems:"center", justifyContent:"center" }}>
              <input type="checkbox" checked={checked[i]} onChange={()=>setChecked(checked.map((v,j)=>j===i?!v:v))} style={{ width:16, height:16, accentColor:ACCENT, cursor:"pointer" }} />
            </div>
          </React.Fragment>
        ))}
      </div>
    </div>

    {/* S6 — CIRCLE */}
    <SectionHeader num={c.circle.num} title={c.circle.title} />
    <p style={{ fontSize:13, color:MID, lineHeight:1.6, marginBottom:12 }}>{c.circle.intro}</p>
    <div style={{ border:`1px solid ${RULE}`, borderRadius:4, overflow:"hidden", marginBottom:32 }}>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 2fr" }}>
        <div style={{...th, padding:"8px 12px", textAlign:"left"}}>{c.circle.whoLabel}</div>
        <div style={{...th, padding:"8px 12px", textAlign:"left"}}>{c.circle.whatLabel}</div>
        {c.circle.rows.map((row,i)=>(
          <React.Fragment key={i}>
            <div style={{ padding:"10px 12px", fontSize:12, fontWeight:700, color:DARK, backgroundColor:i%2===0?"white":"#FAF5F0", borderTop:`1px solid ${RULE}` }}>{row.who}</div>
            <div style={{ padding:"10px 12px", fontSize:12, color:MID, backgroundColor:i%2===0?"white":"#FAF5F0", borderTop:`1px solid ${RULE}` }}>{row.what}</div>
          </React.Fragment>
        ))}
      </div>
    </div>

    {/* FOOTER */}
    <div style={{ borderTop:`1px solid ${RULE}`, paddingTop:16, marginBottom:20, textAlign:"center" }}>
      <p style={{ fontSize:15, fontStyle:"italic", color:DARK, margin:"0 0 8px" }}>{c.footer}</p>
      <p style={{ fontFamily:"sans-serif", fontSize:11, color:SOFT, margin:0 }}>{c.credit}</p>
    </div>

    {/* PRINT BUTTON */}
    <div style={{ textAlign:"center", marginBottom:40 }}>
      <button onClick={()=>window.print()}
        style={{ fontFamily:"sans-serif", fontSize:13, fontWeight:700, letterSpacing:1, padding:"12px 32px", backgroundColor:ACCENT, border:"none", color:"white", cursor:"pointer", borderRadius:3 }}>
        {c.printBtn}
      </button>
    </div>

  </div>
</div>
